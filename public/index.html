<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medical Transcription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Medical Transcription</h1>
            <p>Upload medical audio to generate a clean transcript and extract conditions.</p>
        </header>

        <main>
            <form id="uploadForm" class="upload-area">
                <input type="file" id="audioFile" accept="audio/*" required>
                <button type="submit" id="submitBtn">Transcribe Audio</button>
            </form>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                Processing audio...
            </div>

            <div id="error" class="hidden error-box"></div>

            <div id="results" class="hidden">
                <div class="card">
                    <h2>Transcript</h2>
                    <p id="transcriptText"></p>
                </div>
                
                <div class="card">
                    <h2>Detected Conditions</h2>
                    <ul id="conditionsList" class="badge-list"></ul>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
